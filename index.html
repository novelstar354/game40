<!DOCTYPE html>
<html lang="ja">

<meta charset="UTF-8">
<title>アルファベットゲーム</title>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>

<style>
body{

 display:flex;
 justify-content:center;
 align-items:center;
 min-height:100svh;
 background:#0f172a;
 font-family:system-ui;
touch-action: none;
overflow: hidden;
touch-action: none;
overflow: hidden;


}
#wrap{
 background:#fff7ed;
 padding:10px;
 border-radius:14px;
 position:relative;
 transform-origin:top center;
}
#ui{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:6px;
 font-weight:bold;
 font-size:14px;
}
#right{
 display:flex;
 gap:6px;
 align-items:center;
}
.badge{
 background:#fde68a;
 padding:2px 8px;
 border-radius:999px;
}
#resetBtn{
 border:none;
 background:#fecaca;
 border-radius:999px;
 padding:4px 8px;
 cursor:pointer;
 font-size:14px;
}
canvas{
 width:360px;
 height:520px;
 border-radius:10px;
 background:#fef3c7;
}
#guide{
 position:absolute;
 top:58px;
 width:2px;
 height:460px;
 background:rgba(239,68,68,.6);
 pointer-events:none;
}
.over{
 position:absolute;
 inset:0;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 gap:12px;
 font-size:28px;
 font-weight:bold;
 background:rgba(0,0,0,.5);
 color:white;
}
.hint{
 text-align:center;
 font-size:11px;
 color:#64748b;
 margin-top:4px;
}
</style>
</head>
<body>

<div id="wrap">
 <div id="ui">
  <div>
   Score: <span id="score">0</span><br>
   High: <span id="high">0</span><br>
   Z: <span id="suikaCount">0</span>
  </div>
  <div id="right">
   <div class="badge">🎮 <span id="current">🍒</span></div>
   <div class="badge">➡ <span id="next">🍓</span></div>
   <button id="resetBtn">🔄</button>
  </div>
 </div>

 <div id="guide"></div>
 <canvas id="world" width="360" height="520"></canvas>
 <div class="hint">← → / A D / Space / Enter / R
</div>

 <div id="over" class="over" style="display:none">GAME OVER</div>
</div>

<script>
let suikaCount = 0; // スイカ専用カウンター
const suikaEl = document.getElementById("suikaCount");
const {Engine,Render,Runner,Bodies,World,Events,Sleeping}=Matter;
const SAVE_KEY="suika5";

const canvas=document.getElementById("world");
const wrap=document.getElementById("wrap");
const guide=document.getElementById("guide");
const scoreEl=document.getElementById("score");
const highEl=document.getElementById("high");
const currentEl=document.getElementById("current");
const nextEl=document.getElementById("next");
const overEl=document.getElementById("over");

const engine=Engine.create();
engine.gravity.y=1.05;

Render.run(Render.create({
 canvas,engine,
 options:{width:360,height:520,wireframes:false,background:"#fef3c7"}
}));
Runner.run(Runner.create(),engine);

/*const fruits=[
{e:"🫥",r:14,s:10,d:0.001},

 {e:"🍒",r:12,s:10,d:0.001},
 {e:"🍓",r:16,s:20,d:0.0012},
 {e:"🍇",r:20,s:40,d:0.0015},

 {e:"🍈",r:45,s:1280,d:0.0035},  
 {e:"🍉",r:48,s:1640,d:0.004},
];

/*const fruits=[
 {e:"🍒",r:14,s:10,d:0.001},
 {e:"🍓",r:18,s:20,d:0.0012},
 {e:"🍇",r:23,s:40,d:0.0015},
 {e:"🍊",r:28,s:80,d:0.0018},
 {e:"🍎",r:33,s:160,d:0.0022},
 {e:"🍐",r:38,s:320,d:0.0026},
 {e:"🍑",r:44,s:640,d:0.003},
 {e:"🍍",r:50,s:960,d:0.0032},
 {e:"🍈",r:56,s:1280,d:0.0035},
 {e:"🍉",r:62,s:2048,d:0.004},
]; */
/* 🍎 本家サイズ比 */
const fruits=[ 
{e:"A",r:14,s:10,d:0.001},{e:"B",r:15,s:12,d:0.0015},{e:"C",r:16,s:14,d:0.002},{e:"D",r:17,s:16,d:0.0025},{e:"E",r:18,s:18,d:0.003},{e:"F",r:20,s:20,d:0.0035},{e:"G",r:21,s:22,d:0.004},{e:"H",r:22,s:24,d:0.0045},{e:"I",r:23,s:26,d:0.005},{e:"J",r:24,s:28,d:0.0055},{e:"K",r:25,s:30,d:0.006},{e:"L",r:26,s:32,d:0.0065},{e:"M",r:27,s:34,d:0.007},{e:"N",r:28,s:36,d:0.0075},{e:"O",r:29,s:38,d:0.008},{e:"P",r:30,s:40,d:0.0085},{e:"Q",r:31,s:42,d:0.009},{e:"R",r:32,s:44,d:0.0095},{e:"S",r:33,s:42,d:0.01},{e:"T",r:34,s:44,d:0.015},{e:"U",r:35,s:46,d:0.020},{e:"V",r:36,s:48,d:0.025},{e:"W",r:37,s:50,d:0.03},{e:"X",r:38,s:52,d:0.035},{e:"Y",r:39,s:54,d:0.04},{e:"Z",r:50,s:70,d:0.080},
];


let score=0,highScore=0;
let current=0,next=0;
let canDrop=true,gameOver=false;
let overTimer=0;
let guideX=180;

World.add(engine.world,[
 Bodies.rectangle(180,540,360,40,{isStatic:true}),
 Bodies.rectangle(-10,260,20,520,{isStatic:true}),
 Bodies.rectangle(370,260,20,520,{isStatic:true}),
]);

function scale(){
 const s=Math.min(window.innerWidth/380,window.innerHeight/640,1);
 wrap.style.transform=`scale(${s})`;
}
window.addEventListener("resize",scale);
scale();

function rand(){return Math.floor(Math.random()*15);}

function updateUI(){
 scoreEl.textContent = score;
 highEl.textContent = highScore;
 currentEl.textContent = fruits[current].e;
 nextEl.textContent = fruits[next].e;
 guide.style.left = guideX+"px";
 suikaEl.textContent = suikaCount; // スイカカウンター反映
}

function emojiTex(e,s){
 const c=document.createElement("canvas");
 c.width=c.height=s*2;
 const ctx=c.getContext("2d");
 ctx.font=`${s}px serif`;
 ctx.textAlign="center";
 ctx.textBaseline="middle";
 ctx.fillText(e,s,s);
 return c.toDataURL();
}

function createFruit(x,t,y=40){
 const f=fruits[t];
 const b=Bodies.circle(x,y,f.r,{
  density:f.d,restitution:0.05,friction:0.2,
  render:{sprite:{texture:emojiTex(f.e,f.r*2)}}
 });
 b.fruitType=t;
 b.isMerging=false;
 Sleeping.set(b,false);
 return b;
}

function drop(){
 if(!canDrop||gameOver) return;
 World.add(engine.world,createFruit(guideX,current));
 current=next;
 next=rand();
 updateUI();
 canDrop=false;
 setTimeout(()=>canDrop=true,450);
 save();
}

function fullReset(){
 engine.world.bodies
  .filter(b=>b.fruitType!==undefined)
  .forEach(b=>World.remove(engine.world,b));

 score=0;
 gameOver=false;
 overTimer=0;
 guide.style.display="block";
 overEl.style.display="none";

 current=rand();
 next=rand();
 updateUI();
suikaCount=0;

 localStorage.removeItem(SAVE_KEY);
}

function save(){
 const data=engine.world.bodies
  .filter(b=>b.fruitType!==undefined)
  .map(b=>({x:b.position.x,y:b.position.y,t:b.fruitType}));
 localStorage.setItem(SAVE_KEY, JSON.stringify({
  score, highScore, current, next, gameOver, suikaCount, data
}));
}

function load(){
 const d=JSON.parse(localStorage.getItem(SAVE_KEY)||"null");
 if(!d){current=rand();next=rand();updateUI();return;}
 score=d.score||0;
 highScore=d.highScore||0;
suikaCount = d.suikaCount || 0;
 current=d.current??rand();
 next=d.next??rand();
 updateUI();
 d.data?.forEach(f=>World.add(engine.world,createFruit(f.x,f.t,f.y)));
}

canvas.addEventListener("pointermove",e=>{
/* ===== 正しいタッチ操作 ===== */
let touching = false;
let startInside = false;

canvas.addEventListener("touchstart", e=>{
  if(gameOver) return;

  const r = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX;
  const y = e.touches[0].clientY;

  // キャンバス内で触ったか判定
  startInside =
    x >= r.left && x <= r.right &&
    y >= r.top  && y <= r.bottom;

  if(!startInside) return;

  touching = true;

  const cx = x - r.left;
  guideX = Math.max(20, Math.min(340, cx));
  updateUI();

  e.preventDefault();
}, {passive:false});

canvas.addEventListener("touchmove", e=>{
  if(!touching) return;

  const r = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - r.left;
  guideX = Math.max(20, Math.min(340, x));
  updateUI();

  e.preventDefault();
}, {passive:false});

canvas.addEventListener("touchend", e=>{
  if(!touching || !startInside) return;

  touching = false;
  startInside = false;

  drop(); // ここでだけ落ちる
}, {passive:false});



 if(gameOver) return;
 const r=canvas.getBoundingClientRect();
 guideX=Math.max(20,Math.min(340,e.clientX-r.left));
 updateUI();
});
//canvas.addEventListener("pointerdown",drop);



document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft"||e.key==="a") guideX=Math.max(20,guideX-10);
 if(e.key==="ArrowRight"||e.key==="d") guideX=Math.min(340,guideX+10);

 if(e.key===" "||e.key==="Enter"){
   e.preventDefault();
   drop();
 }

 if(e.key==="r") fullReset();
 updateUI();suikaCount=0;
});



document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'l') {
    alert("流石ですね");
    score += 40000;
    highScore += 40000;
    if (highScore >= score){
        score = highScore;
        }
      if (highScore <= score){
          score = highScore;
          }
  }
});


Events.on(engine,"collisionStart",e=>{
 e.pairs.forEach(p=>{
  const a=p.bodyA, b=p.bodyB;

  if(a.fruitType===b.fruitType && !a.isMerging && !b.isMerging){
   a.isMerging = b.isMerging = true;
   const t = a.fruitType;

   if(t === fruits.length - 1){ // スイカの場合
  suikaCount++; // カウンター増加
  updateUI(); // UI反映
  setTimeout(()=>{
    World.remove(engine.world,[a,b]); // 消す
    save();
  }, 80);
  return;
}

   // 通常のマージ処理
   score += fruits[t].s;
   highScore = Math.max(highScore, score);
   updateUI();
   const x = (a.position.x + b.position.x)/2;
   const y = (a.position.y + b.position.y)/2;
   setTimeout(()=>{
     World.remove(engine.world,[a,b]);
     World.add(engine.world,createFruit(x,t+1,y));
     save();
   },80);
  }
 });
});

Events.on(engine,"beforeUpdate",()=>{
 if(gameOver) return;

 const isDanger = engine.world.bodies.some(b=>{
   if(b.fruitType===undefined) return false;

   // 生成直後は無視（まだ上にあるため）
   if(b.position.y < 197) return false;

   const top = b.position.y - b.circleRadius;
   return top < 130;
 });

 if(isDanger){
   gameOver = true;
   guide.style.display="none";
   overEl.style.display="flex";
   save();
 }
});




document.getElementById("resetBtn").onclick=fullReset;
load();
</script>
</body>
</html>
